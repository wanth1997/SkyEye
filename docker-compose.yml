services:
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      # Mount whole directory (not individual file) so edits that change inode
      # — like atomic-rename editors — propagate into the container.
      - ./prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=4GB
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle
      - --web.external-url=http://prometheus:9090
    ports:
      - "127.0.0.1:9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      # Mount whole directory (includes ./alertmanager/secrets/) so file
      # edits via atomic rename propagate without needing container restart.
      - ./alertmanager:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=http://alertmanager:9093
    ports:
      - "127.0.0.1:9093:9093"

  loki:
    image: grafana/loki:3.1.1
    restart: unless-stopped
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "127.0.0.1:3100:3100"
    # Loki reads AWS creds from EC2 instance profile via IMDSv2.
    # No env var needed.

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - alertmanager
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PW}
      - GF_SERVER_ROOT_URL=https://grafana.wanbrain.com
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
      # --- Cloudflare Access SSO via trusted header ---
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_BASIC_ENABLED=false
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=Cf-Access-Authenticated-User-Email
      - GF_AUTH_PROXY_HEADER_PROPERTY=email
      - GF_AUTH_PROXY_AUTO_SIGN_UP=true
      - GF_AUTH_PROXY_WHITELIST=127.0.0.1,172.16.0.0/12
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Admin
      # Default landing dashboard after login
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/Overview/overview-all.json
      # --- Disable anonymous + snapshots ---
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SNAPSHOTS_EXTERNAL_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"

  cloudflared:
    image: cloudflare/cloudflared:2024.10.0
    restart: unless-stopped
    depends_on:
      - grafana
      - prometheus
      - loki
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro

volumes:
  prometheus_data:
  alertmanager_data:
  loki_data:
  grafana_data:
