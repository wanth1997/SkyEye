auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
  storage:
    s3:
      bucketnames: skyeye-loki-chunks
      region: ap-northeast-1
      s3forcepathstyle: false
      # No access key — uses EC2 instance profile via IMDSv2

schema_config:
  configs:
    - from: 2026-04-22
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h   # 30 days
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_query_series: 5000
  max_query_parallelism: 32
  allow_structured_metadata: false
  # Enable /loki/api/v1/delete for surgical removal of historical entries
  # (e.g. leaked PII from a broken scrub regex). 'filter-and-delete' deletes
  # matching lines; alternatives: 'whole-stream-deletion' (drop whole stream),
  # 'disabled' (default).
  deletion_mode: filter-and-delete

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: s3
  # Window during which a pending delete request can be cancelled. Shorter =
  # delete actually runs sooner. 5m is snappy; 24h is Loki default and safer.
  delete_request_cancel_period: 5m
  compaction_interval: 5m

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true

analytics:
  reporting_enabled: false
