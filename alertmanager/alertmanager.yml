global:
  resolve_timeout: 5m
  smtp_smarthost: smtp.gmail.com:587
  smtp_from: wanth1997@gmail.com
  smtp_auth_username: wanth1997@gmail.com
  smtp_auth_password_file: /etc/alertmanager/secrets/smtp_pass
  smtp_require_tls: true

route:
  receiver: telegram-medium
  group_by: [alertname, product, severity]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: [severity="High"]
      receiver: telegram-high
      group_wait: 0s
      repeat_interval: 30m
      continue: false
    - matchers: [severity="Medium"]
      receiver: telegram-medium
      active_time_intervals: [work-hours]
      continue: false
    - matchers: [severity="Low"]
      receiver: low-digest
      group_interval: 24h
      repeat_interval: 24h
      continue: false

time_intervals:
  - name: work-hours
    time_intervals:
      - times: [{ start_time: '09:00', end_time: '21:00' }]
        location: Asia/Taipei

receivers:
  - name: telegram-high
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/tg_token
        chat_id: -1003712147883
        parse_mode: HTML
        disable_notifications: false
        send_resolved: true
        message: |-
          <b>{{ if eq .Status "firing" }}🚨 High FIRING{{ else }}✅ High RESOLVED{{ end }} — {{ .GroupLabels.alertname }}</b>
          {{ if .GroupLabels.product }}Product: <code>{{ .GroupLabels.product }}</code>{{ end }}
          {{ range .Alerts }}
          • {{ .Annotations.summary }}
          {{- end }}
          {{ if .CommonAnnotations.runbook_url }}
          📖 <a href="{{ .CommonAnnotations.runbook_url }}">Runbook</a>{{ end }}
    email_configs:
      - to: wanth1997@gmail.com
        send_resolved: true

  - name: telegram-medium
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/tg_token
        chat_id: -1003712147883
        parse_mode: HTML
        disable_notifications: true
        send_resolved: true
        message: |-
          <b>{{ if eq .Status "firing" }}⚠️ Medium FIRING{{ else }}✅ Medium RESOLVED{{ end }} — {{ .GroupLabels.alertname }}</b>
          {{ if .GroupLabels.product }}Product: <code>{{ .GroupLabels.product }}</code>{{ end }}
          {{ range .Alerts }}
          • {{ .Annotations.summary }}
          {{- end }}
          {{ if .CommonAnnotations.runbook_url }}
          📖 <a href="{{ .CommonAnnotations.runbook_url }}">Runbook</a>{{ end }}

  - name: low-digest
    email_configs:
      - to: wanth1997@gmail.com
        send_resolved: false
        headers:
          Subject: '[SkyEye Low] {{ .GroupLabels.alertname }}'
