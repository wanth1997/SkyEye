groups:
  - name: business
    interval: 1m
    rules:
      - alert: ZeroPaymentHalfDay
        # Fires only when BOTH:
        #   - in business hours (Asia/Taipei 09:00-22:00 == UTC 01:00-14:00)
        #   - 0 successful payments in the last 12h
        #   - AND >0 payment-create attempts in the last 12h
        # Without the "attempts > 0" clause, alert fires during genuinely
        # quiet periods (new product, off-season) and becomes noise.
        # With it, we only page when users ARE trying to pay but NONE is
        # succeeding — a concrete business problem worth waking someone.
        expr: |
          (hour() >= 1 and hour() <= 14)
          and
          (sum(increase(ppc_payment_success_total[12h])) OR on() vector(0)) == 0
          and
          sum(increase(ppc_payment_created_total[12h])) > 0
        for: 15m
        labels:
          severity: High
          product: ppclub
        annotations:
          summary: "PPClub: {{ with query \"sum(increase(ppc_payment_created_total[12h]))\" }}{{ . | first | value }}{{ end }} payment attempts in last 12hr but 0 succeeded during business hours"
          runbook_url: "https://github.com/wanth1997/SkyEye/blob/master/runbooks/payment-zero.md"

      - alert: RefundSurge
        expr: |
          sum(increase(ppc_refund_total[1h]))
          >
          3 * avg_over_time(sum(increase(ppc_refund_total[1h]))[7d:1h])
        for: 10m
        labels:
          severity: Low
          product: ppclub
        annotations:
          summary: "PPClub: refund rate > 3x 7-day average"

      - alert: ExternalApiDown
        # Match both strict and insecure TLS blackbox jobs
        expr: probe_success{job=~"blackbox.*"} == 0
        for: 5m
        labels:
          severity: High
        annotations:
          summary: "External API {{ $labels.target }} unreachable for 5min"
          runbook_url: "https://github.com/wanth1997/SkyEye/blob/master/runbooks/external-api-down.md"

      - alert: ExternalApiSlow
        expr: probe_duration_seconds{job=~"blackbox.*"} > 5
        for: 10m
        labels:
          severity: Medium
        annotations:
          summary: "External API {{ $labels.target }} probe > 5s for 10min"

      - alert: TlsCertExpiringSoon
        # Fires when cert is within 14 days of expiry BUT not yet expired.
        # Caddy's LE auto-renewal for our own domains targets ~30 days
        # remaining, so a firing alert means renewal has already had its
        # window and failed — or the cert is vendor-managed (NewebPay,
        # Hengfu, Google) and we need to prompt them. Already-expired
        # certs are covered by TlsCertExpired below (High), so we exclude
        # the negative range here to avoid double-alerting on the same
        # underlying problem.
        expr: |
          (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
          and
          (probe_ssl_earliest_cert_expiry - time()) > 0
        for: 10m
        labels:
          severity: Medium
        annotations:
          summary: "TLS cert for {{ $labels.target }} expires in {{ $value | humanize }} days"

      - alert: TlsCertExpired
        expr: (probe_ssl_earliest_cert_expiry - time()) < 0
        for: 5m
        labels:
          severity: High
        annotations:
          summary: "TLS cert for {{ $labels.target }} has EXPIRED ({{ $value | humanizeDuration }} ago)"
          runbook_url: "https://github.com/wanth1997/SkyEye/blob/master/runbooks/external-api-down.md"
