groups:
  - name: business
    interval: 1m
    rules:
      - alert: PaymentSuccessRateLow
        # Replaces the old ZeroPaymentHalfDay (12h zero-success) rule, which
        # produced false positives because PPClub has 5 payment-success paths
        # that the original ppc_payment_success_total instrumentation missed:
        #   - reconciler (NotifyURL miss recovered by 30s scheduler poll)
        #   - resurrect  (late-payment after auto-cancel)
        #   - pay-credit (儲值金 用戶餘額付款)
        # Those paths now also call payment_success.inc() (PPClub commit
        # adding payment_success.inc to 6 confirm sites), so the metric
        # finally tracks reality.
        #
        # New design: ratio-based, with a minimum-traffic floor:
        #   - Only evaluates during Taipei business hours (09:00-23:59 = UTC 01-15)
        #   - Requires ≥5 NewebPay-side OK creates over the last 6h
        #     (filters lone-user-typo noise; PPClub's natural traffic gives
        #      5+ in 6h on any normal business day)
        #   - Fires when success-rate < 30% over 6h
        #   - 30m for: dampens VACC slow-transfer / user-retry race
        # 6h window matches PPClub's natural traffic cycle (peak 17-23,
        # quiet 02-08), so a 0-payment quiet hour never trips this on its own.
        expr: |
          (hour() >= 1 and hour() <= 15)
          and
          sum(increase(ppc_payment_created_total{status="ok"}[6h])) >= 5
          and
          (
            sum(increase(ppc_payment_success_total[6h]))
            /
            sum(increase(ppc_payment_created_total{status="ok"}[6h]))
          ) < 0.3
        for: 30m
        labels:
          severity: High
          product: ppclub
        annotations:
          summary: "PPClub: payment success-rate < 30% over last 6h"
          description: |
            Attempts (status=ok creates): {{ with query "sum(increase(ppc_payment_created_total{status=\"ok\"}[6h]))" }}{{ . | first | value }}{{ end }}
            Successes:                    {{ with query "sum(increase(ppc_payment_success_total[6h]))" }}{{ . | first | value }}{{ end }}
            Success rate:                 {{ with query "100 * sum(increase(ppc_payment_success_total[6h])) / sum(increase(ppc_payment_created_total{status=\"ok\"}[6h]))" }}{{ . | first | value | humanize }}%{{ end }}
          runbook_url: "https://github.com/wanth1997/SkyEye/blob/master/runbooks/payment-zero.md"

      - alert: RefundSurge
        expr: |
          sum(increase(ppc_refund_total[1h]))
          >
          3 * avg_over_time(sum(increase(ppc_refund_total[1h]))[7d:1h])
        for: 10m
        labels:
          severity: Low
          product: ppclub
        annotations:
          summary: "PPClub: refund rate > 3x 7-day average"

      - alert: ExternalApiDown
        # Match both strict and insecure TLS blackbox jobs
        expr: probe_success{job=~"blackbox.*"} == 0
        for: 5m
        labels:
          severity: High
        annotations:
          summary: "External API {{ $labels.target }} unreachable for 5min"
          runbook_url: "https://github.com/wanth1997/SkyEye/blob/master/runbooks/external-api-down.md"

      - alert: ExternalApiSlow
        expr: probe_duration_seconds{job=~"blackbox.*"} > 5
        for: 10m
        labels:
          severity: Medium
        annotations:
          summary: "External API {{ $labels.target }} probe > 5s for 10min"

      - alert: TlsCertExpiringSoon
        # Fires when cert is within 14 days of expiry BUT not yet expired.
        # Caddy's LE auto-renewal for our own domains targets ~30 days
        # remaining, so a firing alert means renewal has already had its
        # window and failed — or the cert is vendor-managed (NewebPay,
        # Hengfu, Google) and we need to prompt them. Already-expired
        # certs are covered by TlsCertExpired below (High), so we exclude
        # the negative range here to avoid double-alerting on the same
        # underlying problem.
        expr: |
          (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
          and
          (probe_ssl_earliest_cert_expiry - time()) > 0
        for: 10m
        labels:
          severity: Medium
        annotations:
          summary: "TLS cert for {{ $labels.target }} expires in {{ $value | humanize }} days"

      - alert: TlsCertExpired
        expr: (probe_ssl_earliest_cert_expiry - time()) < 0
        for: 5m
        labels:
          severity: High
        annotations:
          summary: "TLS cert for {{ $labels.target }} has EXPIRED ({{ $value | humanizeDuration }} ago)"
          runbook_url: "https://github.com/wanth1997/SkyEye/blob/master/runbooks/external-api-down.md"
